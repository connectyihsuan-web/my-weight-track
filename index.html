<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YH｜身體觀測站</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root {
            --bg-color: #faf9f6;
            --card-bg: #ffffff;
            --text-main: #2d2d2d; 
            --text-sub: #555555;  
            --morandi-blue: #7a8d9f; 
            --morandi-rose: #a68d85; 
            --morandi-green: #7a9f8d;
            --border-color: #e8e8e8;
            --progress-bg: #eeeeee;
        }

        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-weight: 300; letter-spacing: 2px; color: var(--morandi-blue); margin-bottom: 5px; }
        
        .container { width: 100%; max-width: 1000px; }
        
        .progress-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px 30px;
            margin-bottom: 25px;
            border: 1px solid var(--border-color);
        }
        .progress-label { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-end;
            margin-bottom: 12px; 
            font-size: 0.9rem; 
            color: var(--text-sub); 
        }
        .progress-info { text-align: right; }
        .predict-tag { color: var(--morandi-green); font-weight: 500; margin-left: 8px; }
        
        .progress-bar-bg { background: var(--progress-bg); height: 8px; border-radius: 4px; overflow: hidden; position: relative; }
        .progress-bar-fill { 
            background: linear-gradient(90deg, var(--morandi-blue), var(--morandi-rose)); 
            height: 100%; width: 0%; border-radius: 4px; transition: width 1s ease-out; 
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
            border: 1px solid var(--border-color);
        }

        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .stat-item { text-align: center; border-right: 1px solid var(--border-color); }
        .stat-item:last-child { border-right: none; }
        .stat-label { font-size: 0.8rem; color: var(--text-sub); margin-bottom: 8px; }
        .stat-value { font-size: 1.3rem; font-weight: 500; color: var(--morandi-blue); }
        .stat-unit { font-size: 0.75rem; margin-left: 2px; }
        .stat-subtext { font-size: 0.7rem; color: var(--text-sub); margin-top: 2px; height: 12px; }

        .controls { margin-bottom: 15px; display: flex; align-items: center; justify-content: flex-end; }
        select { border: 1px solid var(--border-color); background: var(--bg-color); padding: 5px 15px; border-radius: 10px; outline: none; cursor: pointer;}

        h2 { font-weight: 400; font-size: 1.1rem; margin-bottom: 20px; color: var(--text-main); display: flex; align-items: center; }
        h2::before { content: ""; width: 4px; height: 16px; background: var(--morandi-rose); margin-right: 10px; border-radius: 2px; }

        .chart-container { position: relative; height: 320px; width: 100%; margin-bottom: 30px;}
        .chart-container:last-child { margin-bottom: 0; }

        @media (max-width: 600px) {
            body { padding: 20px 15px; }
            .header h1 { font-size: 1.5rem; }
            .stats-row { 
                grid-template-columns: 1fr 1fr; 
                gap: 20px 0; 
            }
            .stat-item {
                border-right: none;
                border-bottom: 1px solid var(--border-color);
                padding-bottom: 15px;
            }
            .stat-item:nth-child(even) { border-left: 1px solid var(--border-color); }
            .stat-item:nth-last-child(-n+2) { border-bottom: none; padding-bottom: 0; }
            .card { padding: 20px; }
            .stat-value { font-size: 1.1rem; }
            .chart-container { height: 280px; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Yi Hsuan Chasing Lines</h1>
    <p>捕捉日復一日的細微變化</p>
</div>

<div class="container">
    <div class="progress-card">
        <div class="progress-label">
            <span>減重進度 <strong id="progress-percent">0%</strong></span>
            <div class="progress-info">
                預計達標 <span id="predict-date-top" class="predict-tag">--/--</span>
                <span id="days-left-top" style="font-size: 0.75rem;">(--天)</span>
            </div>
        </div>
        <div class="progress-bar-bg">
            <div id="progress-fill" class="progress-bar-fill"></div>
        </div>
    </div>

    <div class="card">
        <div class="stats-row">
            <div class="stat-item">
                <div class="stat-label">今日體重</div>
                <div id="cur-kg" class="stat-value">--</div>
                <div class="stat-subtext"></div>
            </div>
            <div class="stat-item">
                <div class="stat-label">體脂率(當日)</div>
                <div id="cur-fat" class="stat-value">--</div>
                <div id="fat-change" class="stat-subtext">--</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">體重變化</div>
                <div id="day-diff" class="stat-value">--</div>
                <div class="stat-subtext">較前次紀錄</div>
            </div>
            <div class="stat-item">
                <div id="target-label" class="stat-label">目標距離</div>
                <div id="target-dist" class="stat-value" style="color: var(--morandi-rose);">--</div>
                <div class="stat-subtext"></div>
            </div>
        </div>
    </div>

    <div class="card">
        <h2>YTD 年度趨勢</h2>
        <div class="chart-container">
            <canvas id="ytdChart"></canvas>
        </div>
    </div>

    <div class="card">
        <div class="controls">
            <select id="monthSelect"></select>
        </div>
        
        <h2>單月體重趨勢</h2>
        <div class="chart-container">
            <canvas id="monthWeightChart"></canvas>
        </div>
        
        <h2 style="margin-top: 40px;">單月身體組成 (7日平均)</h2>
        <div class="chart-container">
            <canvas id="monthCompChart"></canvas>
        </div>
    </div>
</div>

<script>
    const weightUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR7CbjqPmF9IMhzqnL1aBKXVLlYDBvvlE-M0vd0v8opsVR5bAlSmlhKWhZdfk7wWQWn3BRdJkDDzAbq/pub?output=csv';
    const targetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR7CbjqPmF9IMhzqnL1aBKXVLlYDBvvlE-M0vd0v8opsVR5bAlSmlhKWhZdfk7wWQWn3BRdJkDDzAbq/pub?gid=2139827519&single=true&output=csv';
    
    const FINAL_TARGET = 55.0; 
    let allData = [];
    let monthlyTargets = [];
    let charts = {};

    function parseCsv(url) {
        return new Promise((resolve, reject) => {
            Papa.parse(url, {
                download: true, header: true,
                complete: (results) => resolve(results.data),
                error: (error) => reject(error)
            });
        });
    }

    async function init() {
        try {
            const [weightRaw, targetRaw] = await Promise.all([
                parseCsv(weightUrl),
                parseCsv(targetUrl)
            ]);

            allData = weightRaw.filter(row => row.DATE && row.KG && !isNaN(parseFloat(row.KG)));
            monthlyTargets = targetRaw.filter(row => row.MONTH && row.TARGET_KG).map(row => ({
                month: parseInt(row.MONTH),
                target: parseFloat(row.TARGET_KG)
            }));

            // 計算體重與體脂的移動平均 (解決旅行斷點問題)
            const maWeight = getMovingAverageGeneral(allData, 7, 'KG');
            const maFat = getMovingAverageGeneral(allData, 7, 'FAT %');
            const maLbm = getMovingAverageGeneral(allData, 7, 'LBM');
            const maFatKg = getMovingAverageGeneral(allData, 7, 'FAT kg');

            allData.forEach((d, i) => { 
                d.ma7 = maWeight[i]; 
                d.fatMa7 = maFat[i];
                d.lbmMa7 = maLbm[i];
                d.fatKgMa7 = maFatKg[i];
            });

            setupMonthSelector();
            renderAll();
        } catch (err) { console.error("資料讀取失敗:", err); }
    }

    /**
     * 通用平均值計算：自動忽略 NaN，並在數據不足時抓取最近的可用點
     */
    function getMovingAverageGeneral(dataArray, windowSize = 7, key = 'KG') {
        return dataArray.map((val, index, arr) => {
            const slice = arr.slice(Math.max(0, index - windowSize + 1), index + 1);
            const validValues = slice.map(curr => parseFloat(curr[key])).filter(v => !isNaN(v));
            
            if (validValues.length === 0) return null;
            const sum = validValues.reduce((acc, curr) => acc + curr, 0);
            return (sum / validValues.length).toFixed(2);
        });
    }

    function getMonthlyTarget() {
        const currentMonth = new Date().getMonth() + 1;
        const found = monthlyTargets.find(t => t.month === currentMonth);
        return found ? found.target : FINAL_TARGET;
    }

    function renderAll() {
        if (allData.length === 0) return;

        const first = allData[0];
        const latest = allData[allData.length - 1];
        const prev = allData.length > 1 ? allData[allData.length - 2] : latest;
        
        const startKg = parseFloat(first.KG);
        const currentKg = parseFloat(latest.KG);
        const prevKg = parseFloat(prev.KG);
        const monthlyTarget = getMonthlyTarget();

        // 1. 今日體重
        document.getElementById('cur-kg').innerHTML = `${currentKg}<span class="stat-unit">kg</span>`;
        
        // 2. 今日體脂 (保留當日數值顯示在面板)
        const currentFat = parseFloat(latest['FAT %']);
        const prevFat = parseFloat(prev['FAT %']);
        const fatStatus = document.getElementById('fat-change');

        if (!isNaN(currentFat)) {
            document.getElementById('cur-fat').innerHTML = `${currentFat.toFixed(1)}<span class="stat-unit">%</span>`;
            if (!isNaN(prevFat)) {
                const fatDiff = (currentFat - prevFat).toFixed(1);
                fatStatus.innerText = fatDiff > 0 ? `↑ ${fatDiff}%` : (fatDiff < 0 ? `↓ ${Math.abs(fatDiff)}%` : "持平");
                fatStatus.style.color = fatDiff > 0 ? "var(--morandi-rose)" : (fatDiff < 0 ? "var(--morandi-green)" : "var(--morandi-blue)");
            }
        }

        // 3. 體重變化
        const dayDiff = (currentKg - prevKg).toFixed(1);
        const dayDiffElem = document.getElementById('day-diff');
        const arrow = dayDiff > 0 ? "↑" : (dayDiff < 0 ? "↓" : "─");
        dayDiffElem.innerHTML = `${arrow} ${Math.abs(dayDiff)}<span class="stat-unit">kg</span>`;
        dayDiffElem.style.color = dayDiff > 0 ? "var(--morandi-rose)" : (dayDiff < 0 ? "var(--morandi-green)" : "var(--morandi-blue)");

        // 4. 目標距離
        const dist = (currentKg - monthlyTarget).toFixed(1);
        document.getElementById('target-label').innerText = `${new Date().getMonth() + 1}月目標距離`;
        document.getElementById('target-dist').innerHTML = `${dist}<span class="stat-unit">kg</span>`;

        // 5. 達標預測
        if (allData.length > 7) {
            const currentMA = parseFloat(latest.ma7);
            const pastMA = parseFloat(allData[allData.length - 8].ma7);
            const weeklyLoss = pastMA - currentMA; 

            if (weeklyLoss > 0.05) { 
                const dailyLoss = weeklyLoss / 7;
                const remainingKg = currentKg - FINAL_TARGET;
                const daysToTarget = Math.ceil(remainingKg / dailyLoss);
                const targetDate = new Date();
                targetDate.setDate(targetDate.getDate() + daysToTarget);
                document.getElementById('predict-date-top').innerText = `${targetDate.getMonth() + 1}/${targetDate.getDate()}`;
                document.getElementById('days-left-top').innerText = `(約 ${daysToTarget} 天)`;
            } else {
                document.getElementById('predict-date-top').innerText = "觀察中";
                document.getElementById('days-left-top').innerText = "(穩定維持中)";
            }
        }

        const progress = Math.max(0, Math.min(100, ((startKg - currentKg) / (startKg - FINAL_TARGET)) * 100));
        document.getElementById('progress-percent').innerText = progress.toFixed(1) + "%";
        setTimeout(() => { document.getElementById('progress-fill').style.width = progress + "%"; }, 100);

        renderYTDChart();
        renderMonthTrend(document.getElementById('monthSelect').value);
    }

    function setupMonthSelector() {
        const selector = document.getElementById('monthSelect');
        const months = ["1-2月"];
        const others = [...new Set(allData.map(d => {
            const m = parseInt(d.DATE.split('-')[1]);
            return m > 2 ? m + "月" : null;
        }))].filter(m => m !== null).sort((a,b) => parseInt(a)-parseInt(b));
        
        [...months, ...others].forEach(m => {
            const opt = document.createElement('option');
            opt.value = m; opt.innerText = m;
            selector.appendChild(opt);
        });
        selector.value = others.length > 0 ? others[others.length-1] : "1-2月";
        selector.addEventListener('change', () => renderMonthTrend(selector.value));
    }

    function isPeriodPoint(d) { return d && d.備註 && d.備註.includes('生理期'); }
    function segmentIsPeriod(ctx, dataArray) { return isPeriodPoint(dataArray[ctx.p0DataIndex]) || isPeriodPoint(dataArray[ctx.p1DataIndex]); }

    function renderYTDChart() {
        const ctx = document.getElementById('ytdChart').getContext('2d');
        if (charts.ytd) charts.ytd.destroy();
        charts.ytd = new Chart(ctx, {
            type: 'line',
            data: {
                labels: allData.map(d => d.DATE.split('-').slice(1).join('-')),
                datasets: [{
                    data: allData.map(d => d.KG),
                    fill: true, tension: 0.4, borderWidth: 2, pointRadius: 0,
                    segment: {
                        borderColor: ctx => segmentIsPeriod(ctx, allData) ? '#9e827a' : '#8e9fb1',
                        backgroundColor: ctx => segmentIsPeriod(ctx, allData) ? 'rgba(158, 130, 122, 0.15)' : 'rgba(142, 159, 177, 0.05)',
                    }
                }]
            },
            options: { 
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { 
                    y: { beginAtZero: false, ticks: { font: { size: 10 } } },
                    x: { grid: { display: false }, ticks: { font: { size: 10 } } } 
                }
            }
        });
    }

    function renderMonthTrend(selected) {
        let filtered = (selected === "1-2月") 
            ? allData.filter(d => [1,2].includes(parseInt(d.DATE.split('-')[1])))
            : allData.filter(d => parseInt(d.DATE.split('-')[1]) === parseInt(selected));

        const weights = filtered.map(d => parseFloat(d.KG)).filter(w => !isNaN(w));
        const minWeight = Math.floor(Math.min(...weights)) - 0.5;
        const maxWeight = Math.ceil(Math.max(...weights)) + 0.5;

        // 圖表 1：體重與 7 日平均
        const ctxWeight = document.getElementById('monthWeightChart').getContext('2d');
        if (charts.monthWeight) charts.monthWeight.destroy();
        charts.monthWeight = new Chart(ctxWeight, {
            type: 'line',
            data: {
                labels: filtered.map(d => d.DATE.split('-').slice(1).join('-')),
                datasets: [
                    {
                        label: '體重',
                        data: filtered.map(d => d.KG),
                        tension: 0.3, borderWidth: 2.5, pointRadius: 3,
                        pointBackgroundColor: filtered.map(d => isPeriodPoint(d) ? '#9e827a' : '#bda69e'),
                        segment: { borderColor: ctx => segmentIsPeriod(ctx, filtered) ? '#9e827a' : '#bda69e' }
                    },
                    {
                        label: '7日平均',
                        data: filtered.map(d => d.ma7),
                        borderColor: 'rgba(122, 141, 159, 0.4)', borderDash: [5, 5], pointRadius: 0, fill: false
                    }
                ]
            },
            options: { 
                responsive: true, maintainAspectRatio: false,
                interaction: { mode: 'index', intersect: false },
                plugins: { legend: { display: false } },
                scales: { y: { min: minWeight, max: maxWeight } }
            }
        });

        // 圖表 2：身體組成 (全部改為 7 日平均趨勢)
        const ctxComp = document.getElementById('monthCompChart').getContext('2d');
if (charts.monthComp) charts.monthComp.destroy();

// 取得當前顯示數據的最大最小值，用來做動態 Y 軸縮放
const lbmValues = filtered.map(d => parseFloat(d.lbmMa7)).filter(v => !isNaN(v));
const fatKgValues = filtered.map(d => parseFloat(d.fatKgMa7)).filter(v => !isNaN(v));
const combinedWeight = [...lbmValues, ...fatKgValues];
const weightMin = Math.min(...combinedWeight) * 0.95; // 留 5% 緩衝
const weightMax = Math.max(...combinedWeight) * 1.05;

charts.monthComp = new Chart(ctxComp, {
    type: 'line',
    data: {
        labels: filtered.map(d => d.DATE.split('-').slice(1).join('-')),
        datasets: [
            {
                label: 'LBM (平均)',
                data: filtered.map(d => d.lbmMa7),
                borderColor: '#7a9f8d',
                borderWidth: 2,
                pointRadius: 0,
                yAxisID: 'y',
                spanGaps: true,
                tension: 0.2
            },
            {
                label: 'FAT kg (平均)',
                data: filtered.map(d => d.fatKgMa7),
                borderColor: '#a68d85',
                borderWidth: 2,
                pointRadius: 0,
                yAxisID: 'y',
                spanGaps: true,
                tension: 0.2
            },
            {
                label: '體脂率 (平均 %)',
                data: filtered.map(d => d.fatMa7),
                borderColor: '#7a8d9f',
                borderWidth: 2,
                borderDash: [5, 5],
                pointRadius: 0,
                yAxisID: 'y1',
                spanGaps: true,
                tension: 0.2
            }
        ]
    },
    options: { 
        responsive: true, 
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: { 
            legend: { 
                position: 'bottom', 
                labels: { 
                    usePointStyle: true, 
                    boxWidth: 6, // 這裡調小圈圈尺寸 (原本是 8 或更大)
                    font: { size: 11 }
                } 
            },
            tooltip: {
                padding: 10,
                backgroundColor: 'rgba(255, 255, 255, 0.9)',
                titleColor: '#2d2d2d',
                bodyColor: '#555',
                borderColor: '#e8e8e8',
                borderWidth: 1,
                bodyFont: { size: 12 },
                callbacks: {
                    label: function(context) {
                        let unit = context.datasetIndex === 2 ? '%' : 'kg';
                        return ` ${context.dataset.label}: ${context.parsed.y} ${unit}`;
                    }
                }
            }
        },
        scales: { 
            y: { 
                type: 'linear', 
                position: 'left', 
                min: weightMin, // 動態起始值，不再從 0 開始
                max: weightMax,
                grid: { color: '#f0f0f0' },
                title: { display: false } 
            },
            y1: { 
                type: 'linear', 
                position: 'right', 
                // 體脂率也做動態縮放
                suggestedMin: Math.min(...filtered.map(d => parseFloat(d.fatMa7)).filter(v => !isNaN(v))) - 0.5,
                suggestedMax: Math.max(...filtered.map(d => parseFloat(d.fatMa7)).filter(v => !isNaN(v))) + 0.5,
                grid: { drawOnChartArea: false },
                title: { display: false }
            },
            x: {
                grid: { display: false }
            }
        }
    }
});

    init();
</script>
</body>
</html>
