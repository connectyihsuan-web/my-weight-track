<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yi Hsuan｜體重紀錄看板</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root {
            --bg-color: #faf9f6;
            --card-bg: #ffffff;
            --text-main: #2d2d2d; 
            --text-sub: #555555;  
            --morandi-blue: #7a8d9f; 
            --morandi-rose: #a68d85; 
            --period-color: #795548; 
            --ma-line-color: rgba(122, 141, 159, 0.5); /* 移動平均線顏色 */
            --border-color: #e8e8e8;
        }

        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-weight: 300; letter-spacing: 2px; color: var(--morandi-blue); margin-bottom: 5px; }
        
        .legend { display: flex; justify-content: center; flex-wrap: wrap; gap: 15px; font-size: 0.8rem; margin-top: 10px; color: var(--text-sub); }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; }
        .line-sample { width: 20px; height: 2px; }

        .container { width: 100%; max-width: 900px; }
        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
            border: 1px solid var(--border-color);
        }

        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .stat-item { text-align: center; border-right: 1px solid var(--border-color); }
        .stat-item:last-child { border-right: none; }
        .stat-label { font-size: 0.85rem; color: var(--text-sub); margin-bottom: 8px; }
        .stat-value { font-size: 1.6rem; font-weight: 500; color: var(--morandi-blue); }

        .controls { margin-bottom: 15px; display: flex; align-items: center; justify-content: flex-end; }
        select { 
            border: 1px solid var(--border-color); 
            background: var(--bg-color); 
            padding: 5px 15px; 
            border-radius: 10px; 
            outline: none;
            cursor: pointer;
        }

        h2 { font-weight: 400; font-size: 1.1rem; margin-bottom: 20px; color: var(--text-main); display: flex; align-items: center; }
        h2::before { content: ""; width: 4px; height: 16px; background: var(--morandi-rose); margin-right: 10px; border-radius: 2px; }
        .ytd-header::before { background: var(--morandi-blue); }

        canvas { width: 100% !important; max-height: 350px; }
    </style>
</head>
<body>

<div class="header">
    <h1>Yi Hsuan Weight Tracking</h1>
    <p>捕捉日復一日的細微變化</p>
    <div class="legend">
        <div class="legend-item"><div class="dot" style="background: #8e9fb1;"></div> 一般日區間</div>
        <div class="legend-item"><div class="dot" style="background: var(--period-color);"></div> 生理期區間</div>
        <div class="legend-item"><div class="line-sample" style="border-top: 2px dashed var(--ma-line-color);"></div> 7日移動平均</div>
    </div>
</div>

<div class="container">
    <div class="card">
        <div class="stats-row">
            <div class="stat-item">
                <div class="stat-label">當前體重</div>
                <div id="cur-kg" class="stat-value">--</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">本月變化</div>
                <div id="mon-diff" class="stat-value">--</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">今年累計減重</div>
                <div id="ytd-diff" class="stat-value">--</div>
            </div>
        </div>
    </div>

    <div class="card">
        <h2 class="ytd-header">YTD 全年度體重曲線</h2>
        <canvas id="ytdChart"></canvas>
    </div>

    <div class="card">
        <div class="controls">
            <select id="monthSelect"></select>
        </div>
        <h2>單月詳細趨勢</h2>
        <canvas id="monthTrendChart"></canvas>
    </div>
</div>

<script>
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR7CbjqPmF9IMhzqnL1aBKXVLlYDBvvlE-M0vd0v8opsVR5bAlSmlhKWhZdfk7wWQWn3BRdJkDDzAbq/pub?output=csv';
    
    let allData = [];
    let charts = {};

    function init() {
        Papa.parse(sheetUrl, {
            download: true, header: true,
            complete: function(results) {
                allData = results.data.filter(row => row.DATE && row.KG && !isNaN(parseFloat(row.KG)));
                setupMonthSelector();
                renderAll();
            }
        });
    }

    // 計算移動平均線的輔助函數
    function getMovingAverage(dataArray, windowSize = 7) {
        return dataArray.map((val, index, arr) => {
            if (index < windowSize - 1) return null;
            const slice = arr.slice(index - windowSize + 1, index + 1);
            const sum = slice.reduce((acc, curr) => acc + parseFloat(curr.KG), 0);
            return (sum / windowSize).toFixed(2);
        });
    }

    function setupMonthSelector() {
        const selector = document.getElementById('monthSelect');
        const months = ["1-2月"];
        const others = [...new Set(allData.map(d => {
            const m = parseInt(d.DATE.split('-')[1]);
            return m > 2 ? m + "月" : null;
        }))].filter(m => m !== null).sort((a,b) => parseInt(a)-parseInt(b));
        
        [...months, ...others].forEach(m => {
            const opt = document.createElement('option');
            opt.value = m; opt.innerText = m;
            selector.appendChild(opt);
        });
        selector.value = others.length > 0 ? others[others.length-1] : "1-2月";
        selector.addEventListener('change', () => renderMonthTrend(selector.value));
    }

    function renderAll() {
        const latest = allData[allData.length - 1];
        const first = allData[0];
        document.getElementById('cur-kg').innerText = latest.KG + " kg";
        
        const totalDiff = (parseFloat(latest.KG) - parseFloat(first.KG)).toFixed(1);
        document.getElementById('ytd-diff').innerText = (totalDiff > 0 ? "+" : "") + totalDiff + " kg";

        renderYTDChart();
        renderMonthTrend(document.getElementById('monthSelect').value);
    }

    function isPeriodPoint(d) {
        return d && d.備註 && d.備註.includes('生理期');
    }

    function segmentIsPeriod(ctx, dataArray) {
        return isPeriodPoint(dataArray[ctx.p0DataIndex]) || isPeriodPoint(dataArray[ctx.p1DataIndex]);
    }

    // --- 1. YTD 全年度曲線 ---
    function renderYTDChart() {
        const ctx = document.getElementById('ytdChart').getContext('2d');
        if (charts.ytd) charts.ytd.destroy();

        charts.ytd = new Chart(ctx, {
            type: 'line',
            data: {
                labels: allData.map(d => d.DATE.split('-').slice(1).join('-')),
                datasets: [{
                    label: '體重',
                    data: allData.map(d => d.KG),
                    fill: true,
                    tension: 0.4,
                    borderWidth: 2,
                    pointRadius: 0,
                    segment: {
                        borderColor: ctx => segmentIsPeriod(ctx, allData) ? '#9e827a' : '#8e9fb1',
                        backgroundColor: ctx => segmentIsPeriod(ctx, allData) ? 'rgba(158, 130, 122, 0.15)' : 'rgba(142, 159, 177, 0.05)',
                    }
                }]
            },
            options: { 
                responsive: true, 
                plugins: { 
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                const d = allData[context.dataIndex];
                                let label = ` 體重: ${context.parsed.y} kg`;
                                if (d.備註) label += ` | 📝 ${d.備註}`;
                                return label;
                            }
                        }
                    }
                },
                scales: { x: { grid: { display: false } } }
            }
        });
    }

    // --- 2. 單月詳細趨勢 (含 7日平均線 & 備註) ---
    function renderMonthTrend(selected) {
        let filtered = (selected === "1-2月") 
            ? allData.filter(d => [1,2].includes(parseInt(d.DATE.split('-')[1])))
            : allData.filter(d => parseInt(d.DATE.split('-')[1]) === parseInt(selected));

        if (filtered.length === 0) return;

        const diff = (parseFloat(filtered[filtered.length-1].KG) - parseFloat(filtered[0].KG)).toFixed(1);
        document.getElementById('mon-diff').innerText = (diff > 0 ? "+" : "") + diff + " kg";

        const maData = getMovingAverage(filtered, 7);

        const ctx = document.getElementById('monthTrendChart').getContext('2d');
        if (charts.month) charts.month.destroy();

        charts.month = new Chart(ctx, {
            type: 'line',
            data: {
                labels: filtered.map(d => d.DATE.split('-').slice(1).join('-')),
                datasets: [
                    {
                        // 原始體重線
                        label: '每日體重',
                        data: filtered.map(d => d.KG),
                        tension: 0.3,
                        borderWidth: 2.5,
                        pointRadius: 3,
                        pointBackgroundColor: filtered.map(d => isPeriodPoint(d) ? '#9e827a' : '#bda69e'),
                        pointBorderColor: filtered.map(d => isPeriodPoint(d) ? '#9e827a' : '#bda69e'),
                        segment: {
                            borderColor: ctx => segmentIsPeriod(ctx, filtered) ? '#9e827a' : '#bda69e',
                        },
                        zIndex: 2
                    },
                    {
                        // 7日移動平均線
                        label: '7日平均',
                        data: maData,
                        borderColor: 'rgba(122, 141, 159, 0.4)',
                        borderWidth: 2,
                        borderDash: [5, 5],
                        pointRadius: 0,
                        fill: false,
                        tension: 0.4,
                        zIndex: 1
                    }
                ]
            },
            options: { 
                responsive: true,
                interaction: {
                    mode: 'index',
                    intersect: false,
                },
                plugins: { 
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: 'rgba(255, 255, 255, 0.9)',
                        titleColor: '#2d2d2d',
                        bodyColor: '#555555',
                        borderColor: '#e8e8e8',
                        borderWidth: 1,
                        padding: 10,
                        callbacks: {
                            label: function(context) {
                                if (context.datasetIndex === 0) {
                                    const d = filtered[context.dataIndex];
                                    let label = ` 體重: ${context.parsed.y} kg`;
                                    if (d.備註) label += ` | 📝 ${d.備註}`;
                                    return label;
                                } else {
                                    return ` 7日平均: ${context.parsed.y} kg`;
                                }
                            }
                        }
                    }
                },
                scales: { 
                    x: { grid: { display: false } },
                    y: { 
                        beginAtZero: false,
                        ticks: {
                            callback: function(value) { return value + 'kg'; }
                        }
                    }
                }
            }
        });
    }

    init();
</script>
</body>
</html>
